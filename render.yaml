services:
  - type: web
    name: ai-lab
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-lab-db
          property: connectionString
    autoDeploy: false

databases:
  - name: ai-lab-db
    databaseName: ai_lab
    user: ai_lab_user
    plan: free